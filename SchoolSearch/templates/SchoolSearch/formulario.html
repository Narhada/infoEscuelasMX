<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>🔍 Buscador de Escuelas | Encuentra tu centro ideal</title>
    <!-- Google Fonts - Tipografía moderna y legible -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (iconos profesionales) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #eef2f7 0%, #d9e2ec 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            margin: 0;
        }

        /* Tarjeta principal */
        .search-card {
            max-width: 680px;
            width: 100%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(0px);
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25), 0 8px 18px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            overflow: hidden;
        }

        .search-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 30px 50px -15px rgba(0, 0, 0, 0.3);
        }

        /* Encabezado con estilo */
        .card-header {
            background: white;
            padding: 1.8rem 2rem 0.8rem 2rem;
            border-bottom: 1px solid #eef2f8;
        }

        .card-header h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #0a2b3e;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.3px;
        }

        .card-header h1 i {
            background: #2c7da0;
            background: linear-gradient(145deg, #2c7da0, #1f5e7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-size: 2rem;
        }

        .subhead {
            color: #5b6f82;
            margin-top: 0.6rem;
            font-weight: 400;
            font-size: 0.95rem;
            border-left: 3px solid #2c7da0;
            padding-left: 0.8rem;
        }

        /* Área del formulario */
        .form-container {
            padding: 1.5rem 2rem 2rem 2rem;
        }

        /* Estilos para el formulario generado con form.as_p */
        form p {
            margin-bottom: 1.5rem;
        }

        /* Etiquetas */
        form label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
            color: #1f3b4c;
            letter-spacing: -0.2px;
        }

        /* Campos de entrada, select, textarea */
        form input:not([type="submit"]):not([type="button"]),
        form select,
        form textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            font-size: 0.95rem;
            font-family: 'Inter', monospace;
            border: 1.5px solid #e2e8f0;
            border-radius: 1rem;
            background-color: #ffffff;
            transition: all 0.2s ease;
            outline: none;
            color: #0f2c3b;
            font-weight: 500;
        }

        form input:not([type="submit"]):focus,
        form select:focus,
        form textarea:focus {
            border-color: #2c7da0;
            box-shadow: 0 0 0 4px rgba(44, 125, 160, 0.15);
            background-color: #fefefe;
        }

        /* Estilo para los select (desplegables) */
        form select {
            appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%234b6b7f' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1rem;
        }

        /* Checkbox y radio (si los hubiera) se ven prolijos */
        form input[type="checkbox"],
        form input[type="radio"] {
            width: auto;
            margin-right: 0.5rem;
            transform: scale(1.1);
            vertical-align: middle;
        }

        /* Mensajes de error (si el formulario tiene errores) */
        .errorlist {
            list-style: none;
            margin-top: 0.5rem;
            padding: 0;
            color: #e53e3e;
            font-size: 0.8rem;
            font-weight: 500;
            background: #fff5f5;
            border-radius: 1rem;
            padding: 0.5rem 1rem;
            border-left: 4px solid #e53e3e;
        }

        .errorlist li {
            margin: 0.2rem 0;
        }

        /* Texto de ayuda (help_text) */
        .helptext {
            display: block;
            font-size: 0.7rem;
            color: #7f8c8d;
            margin-top: 0.3rem;
            letter-spacing: 0.2px;
        }

        /* Botón de búsqueda moderno */
        .button-wrapper {
            margin-top: 2rem;
            text-align: center;
        }

        button[type="submit"] {
            background: linear-gradient(95deg, #1f6390 0%, #2c7da0 100%);
            border: none;
            padding: 0.9rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            color: white;
            border-radius: 3rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.25s ease;
            box-shadow: 0 8px 18px -8px rgba(28, 85, 110, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            letter-spacing: 0.3px;
        }

        button[type="submit"] i {
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        button[type="submit"]:hover {
            background: linear-gradient(95deg, #155a7c 0%, #236f8f 100%);
            transform: scale(1.01);
            box-shadow: 0 12px 22px -10px #1f5e7a;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Estilos responsivos */
        @media (max-width: 550px) {
            body {
                padding: 1rem;
            }
            .card-header {
                padding: 1.2rem 1.2rem 0.5rem 1.2rem;
            }
            .card-header h1 {
                font-size: 1.5rem;
            }
            .form-container {
                padding: 1rem 1.2rem 1.8rem 1.2rem;
            }
            form input:not([type="submit"]),
            form select,
            form textarea {
                padding: 0.75rem 0.9rem;
            }
        }

        /* Mejora visual para campos deshabilitados o readonly */
        form input:disabled,
        form select:disabled {
            background-color: #f1f5f9;
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Separación sutil entre campos */
        hr.divider-light {
            margin: 1rem 0;
            border: 0;
            height: 1px;
            background: linear-gradient(to right, #e2e8f0, transparent);
        }

        /* Pie de página opcional */
        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #8aa0b0;
            border-top: 1px solid #edf2f7;
            padding: 1.2rem 2rem;
            background: #fafcff;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .footer-note i {
            font-size: 0.75rem;
        }

        a {
            text-decoration: none;
            color: #2c7da0;
        }

        a:hover {
            text-decoration: underline;
        }

        /* Animación suave de entrada */
        .search-card {
            animation: fadeSlideUp 0.35s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

<div class="search-card">
    <div class="card-header">
        <h1>
            <i class="fas fa-school-circle-check"></i> 
            Buscar escuelas
        </h1>
        <div class="subhead">
            <i class="fas fa-map-pin"></i> Encuentra centros educativos por nombre, ubicación o nivel &nbsp;•&nbsp; <strong>resultados precisos</strong>
        </div>
    </div>

    <div class="form-container">
        <!-- Formulario principal manteniendo la estructura original de Django -->
        <form method="POST" novalidate>
            {% csrf_token %}

            <!-- form.as_p se muestra con diseño mejorado gracias a los estilos CSS -->
            {{ form.as_p }}

            <div class="button-wrapper">
                <button type="submit" id="searchButton">
                    <i class="fas fa-magnifying-glass"></i> 
                    <span>Buscar centros educativos</span>
                </button>
            </div>
        </form>
    </div>

    <div class="footer-note">
        <span><i class="far fa-building"></i> +2.000 escuelas registradas</span>
        <span><i class="fas fa-filter"></i> Filtros avanzados disponibles</span>
        <span><i class="far fa-clock"></i> Resultados actualizados</span>
    </div>
</div>

<!-- Pequeño script para mejorar la UX: evita doble envío y muestra feedback -->
<script>
    (function() {
        const form = document.querySelector('form');
        const submitBtn = document.getElementById('searchButton');
        
        if (form && submitBtn) {
            form.addEventListener('submit', function(e) {
                // Prevenir doble envío accidental (si el usuario hace clic varias veces)
                if (submitBtn.disabled) {
                    e.preventDefault();
                    return;
                }
                
                // Cambiar estado visual del botón para indicar carga
                const originalContent = submitBtn.innerHTML;
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.8';
                submitBtn.style.cursor = 'wait';
                submitBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> <span>Buscando escuelas...</span>';
                
                // No prevenimos el envío real, el formulario continuará con el POST
                // El botón se restaurará cuando la página se recargue con la respuesta.
                // Si ocurre algún error de red, dejamos que el navegador maneje, pero
                // en caso de que el form no se envíe por validación html5, mantenemos seguro.
                // (pequeño timeout por si el submit falla por validación cliente)
                setTimeout(function() {
                    if (submitBtn.disabled === true && document.readyState !== 'complete') {
                        // Si después de 3 segundos aún está deshabilitado y no hubo recarga,
                        // lo restauramos (caso borde, por si la validación cliente evita envío)
                        submitBtn.disabled = false;
                        submitBtn.style.opacity = '1';
                        submitBtn.style.cursor = 'pointer';
                        submitBtn.innerHTML = originalContent;
                    }
                }, 3000);
            });
        }

        // Mejora opcional: añadir clase a los campos para mayor claridad visual 
        // (los estilos ya son robustos, pero añadimos un helper para los inputs)
        const inputs = document.querySelectorAll('form input, form select, form textarea');
        inputs.forEach(input => {
            if (input.type !== 'submit' && input.type !== 'button' && input.type !== 'hidden') {
                input.setAttribute('autocomplete', 'on');
                // Pequeño detalle: si el campo está vacío y es el primero, no se agrega nada extra
            }
        });

        // Si existe algún mensaje de error, hacer scroll suave hacia el primer error
        const firstError = document.querySelector('.errorlist');
        if (firstError) {
            firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    })();
</script>
</body>
</html>
